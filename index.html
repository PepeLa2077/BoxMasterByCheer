document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

DCCE;border-radius:99px;padding:5px;align-self:flex-start\">\n          <sc-for list=\"{{ dashTabs }}\" as=\"dt\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ dt.go }}\" style=\"{{ dt.style }}\">{{ dt.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- ── Dashboard กล่อง ── -->\n        <sc-if value=\"{{ dashIsBox }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:24px\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px\">\n          <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <div style=\"{{ c.style }}\">\n              <div style=\"font-size:26px;font-weight:800;line-height:1.1\">{{ c.value }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;font-weight:600;opacity:0.85\">{{ c.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div>\n          <h2 style=\"font-size:17px;font-weight:800;margin:0 0 4px\">📦 สถานะกล่องยา<\u002Fh2>\n          <p style=\"margin:0 0 12px;font-size:13px;color:#8A7360\">กล่อง HAD (1–4) มียา 13 รายการ · กล่อง CPR (5–22) มียา 6 รายการ<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px\">\n            <sc-for list=\"{{ boxCards }}\" as=\"b\" hint-placeholder-count=\"8\">\n              <div sc-camel-on-click=\"{{ b.open }}\" style=\"background:#FFFFFF;border:1px solid #E7DCCE;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 2px rgba(28,53,64,0.04);cursor:pointer\" style-hover=\"border-color:#C89D72;box-shadow:0 3px 12px rgba(28,53,64,0.10)\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n                  <div style=\"font-weight:800;font-size:15px\">{{ b.name }}<\u002Fdiv>\n                  <span style=\"{{ b.badgeStyle }}\">{{ b.badgeLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:6px\">\n                  <span style=\"{{ b.wardStyle }}\">{{ b.wardLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#8A7360\">หมดอายุ: <strong style=\"color:#3D2E23\">{{ b.expiryTxt }}<\u002Fstrong> ({{ b.leftTxt }})<\u002Fdiv>\n                <sc-if value=\"{{ b.effNoteOn }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:11.5px;font-weight:600;color:#C25812\">{{ b.effNote }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ b.hasAlerts }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border-top:1px dashed #E7DCCE;padding-top:8px;display:flex;flex-direction:column;gap:4px\">\n                    <sc-for list=\"{{ b.alerts }}\" as=\"al\" hint-placeholder-count=\"1\">\n                      <div style=\"{{ al.style }}\">{{ al.text }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ b.showNearest }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border-top:1px dashed #E7DCCE;padding-top:8px;font-size:11.5px;color:#8A7360\">ยาหมดอายุใกล้สุด: <strong style=\"color:#3D5560\">{{ b.nearestTxt }}<\u002Fstrong><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ── Dashboard ยา (Lot) ── -->\n        <sc-if value=\"{{ dashIsLot }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:24px\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px\">\n          <sc-for list=\"{{ lotChips }}\" as=\"lc2\" hint-placeholder-count=\"4\">\n            <div style=\"{{ lc2.style }}\">\n              <div style=\"font-size:26px;font-weight:800;line-height:1.1\">{{ lc2.value }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;font-weight:600;opacity:0.85\">{{ lc2.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div>\n          <h2 style=\"font-size:17px;font-weight:800;margin:0 0 4px\">💊 ยาที่ต้องจัดการ<\u002Fh2>\n          <p style=\"margin:0 0 12px;font-size:13px;color:#8A7360\">สรุปยาอายุสั้นสุดของแต่ละกล่อง ที่หมดอายุแล้วหรือใกล้หมดอายุภายใน 60 วัน<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px\">\n\n            <div style=\"background:#FFFFFF;border:1px solid #F0C3C3;border-radius:14px;overflow:hidden\">\n              <div style=\"display:flex;align-items:center;gap:8px;padding:11px 16px;background:#FBE3E3\">\n                <span style=\"width:9px;height:9px;border-radius:99px;background:#D14343\"><\u002Fspan>\n                <span style=\"font-size:13.5px;font-weight:800;color:#B03030\">หมดอายุแล้ว<\u002Fspan>\n                <span style=\"margin-left:auto;font-size:12.5px;font-weight:800;color:#B03030\">{{ expiredCount }} รายการ<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ expiredEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:16px;font-size:13px;color:#8A7360\">ไม่มียาหมดอายุ<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-for list=\"{{ expiredLots }}\" as=\"el\" hint-placeholder-count=\"1\">\n                <div style=\"padding:11px 16px;border-top:1px solid #F8ECEC;display:flex;flex-direction:column;gap:5px\">\n                  <div style=\"display:flex;align-items:baseline;gap:8px;flex-wrap:wrap\">\n                    <span style=\"font-weight:700;font-size:13.5px\">{{ el.drug }}<\u002Fspan>\n                    \n                  <\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#B03030;font-weight:600\">หมดอายุ {{ el.expTxt }} ({{ el.leftTxt }})<\u002Fdiv>\n                  <div style=\"display:flex;gap:4px;flex-wrap:wrap\">\n                    <sc-for list=\"{{ el.whereList }}\" as=\"ew\" hint-placeholder-count=\"1\">\n                      <span style=\"font-size:11.5px;font-weight:600;background:#F0E9DE;color:#3D5560;padding:2px 8px;border-radius:6px\">{{ ew }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"background:#FFFFFF;border:1px solid #F0E2B6;border-radius:14px;overflow:hidden\">\n              <div style=\"display:flex;align-items:center;gap:8px;padding:11px 16px;background:#FCF3D7\">\n                <span style=\"width:9px;height:9px;border-radius:99px;background:#D99A06\"><\u002Fspan>\n                <span style=\"font-size:13.5px;font-weight:800;color:#96690B\">ใกล้หมดอายุ (&lt;60 วัน)<\u002Fspan>\n                <span style=\"margin-left:auto;font-size:12.5px;font-weight:800;color:#96690B\">{{ nearCount }} รายการ<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ nearEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:16px;font-size:13px;color:#8A7360\">ไม่มียาใกล้หมดอายุ<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-for list=\"{{ nearLots }}\" as=\"nl\" hint-placeholder-count=\"2\">\n                <div style=\"padding:11px 16px;border-top:1px solid #F8F3E4;display:flex;flex-direction:column;gap:5px\">\n                  <div style=\"display:flex;align-items:baseline;gap:8px;flex-wrap:wrap\">\n                    <span style=\"font-weight:700;font-size:13.5px\">{{ nl.drug }}<\u002Fspan>\n                    \n                  <\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#96690B;font-weight:600\">หมดอายุ {{ nl.expTxt }} (เหลือ {{ nl.leftTxt }})<\u002Fdiv>\n                  <div style=\"display:flex;gap:4px;flex-wrap:wrap\">\n                    <sc-for list=\"{{ nl.whereList }}\" as=\"nw\" hint-placeholder-count=\"1\">\n                      <span style=\"font-size:11.5px;font-weight:600;background:#F0E9DE;color:#3D5560;padding:2px 8px;border-radius:6px\">{{ nw }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <h2 style=\"font-size:17px;font-weight:800;margin:0 0 4px\">💊 ยาอายุสั้นสุดในแต่ละกล่อง<\u002Fh2>\n          <p style=\"margin:0 0 12px;font-size:13px;color:#8A7360\">เรียงตามวันหมดอายุ — เห็นทันทีว่ายาอายุสั้นสุดของแต่ละกล่องหมดเมื่อไหร่<\u002Fp>\n          <div style=\"background:#FFFFFF;border:1px solid #E7DCCE;border-radius:14px;overflow-x:auto\">\n            <div style=\"min-width:820px\">\n              <div style=\"display:grid;grid-template-columns:1.4fr 0.75fr 0.9fr 0.6fr 0.9fr 2fr;gap:10px;padding:10px 16px;font-size:12px;font-weight:700;color:#8A7360;border-bottom:1px solid #E7DCCE;background:#FAF6EF\">\n                <div>ยา<\u002Fdiv><div>กล่อง<\u002Fdiv><div>วันหมดอายุ<\u002Fdiv><div>เหลือ<\u002Fdiv><div>สถานะ<\u002Fdiv><div>อยู่ที่<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ lotRows }}\" as=\"lr\" hint-placeholder-count=\"6\">\n                <div style=\"{{ lr.rowStyle }}\">\n                  <div style=\"font-weight:600\">{{ lr.drug }}<\u002Fdiv>\n                  <div style=\"font-weight:700\">{{ lr.boxTxt }}<\u002Fdiv>\n                  <div>{{ lr.expTxt }}<\u002Fdiv>\n                  <div>{{ lr.leftTxt }}<\u002Fdiv>\n                  <div><span style=\"{{ lr.badgeStyle }}\">{{ lr.badgeLabel }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:12.5px;font-weight:600;color:#3D5560\">{{ lr.whereTxt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ── Dashboard ตำแหน่งกล่อง ── -->\n        <sc-if value=\"{{ dashIsLoc }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <h2 style=\"font-size:17px;font-weight:800;margin:0 0 4px\">📍 ตำแหน่งกล่อง<\u002Fh2>\n          <p style=\"margin:0 0 12px;font-size:13px;color:#8A7360\">แต่ละที่มีกล่องอะไรอยู่บ้าง — รวมกล่องที่ยังอยู่ห้องยา<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px\">\n            <sc-for list=\"{{ locCards }}\" as=\"lo\" hint-placeholder-count=\"6\">\n              <div style=\"{{ lo.cardStyle }}\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px\">\n                  <div style=\"font-weight:800;font-size:14.5px\">{{ lo.name }}<\u002Fdiv>\n                  <span style=\"{{ lo.countStyle }}\">{{ lo.countTxt }}<\u002Fspan>\n                <\u002Fdiv>\n                <sc-if value=\"{{ lo.empty }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:12.5px;color:#B3A18D;font-style:italic\">ไม่มีกล่อง<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"display:flex;flex-direction:column;gap:6px\">\n                  <sc-for list=\"{{ lo.boxes }}\" as=\"lb\" hint-placeholder-count=\"1\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;background:#FAF6EF;border:1px solid #EFE8DD;border-radius:9px;padding:7px 10px\">\n                      <div style=\"font-weight:700;font-size:13px\">📦 {{ lb.name }}<\u002Fdiv>\n                      <div style=\"display:flex;align-items:center;gap:8px\">\n                        <span style=\"font-size:11.5px;color:#8A7360\">หมด {{ lb.expTxt }}<\u002Fspan>\n                        <span style=\"{{ lb.badgeStyle }}\">{{ lb.badgeLabel }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ── Dashboard ปัญหาปีนี้ ── -->\n        <sc-if value=\"{{ dashIsProb }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <h2 style=\"font-size:17px;font-weight:800;margin:0 0 4px\">⚠️ ปัญหาที่พบในปีนี้ ({{ probYearLabel }})<\u002Fh2>\n          <p style=\"margin:0 0 12px;font-size:13px;color:#8A7360\">สรุปจากประวัติการแลกเปลี่ยนทั้งหมด {{ probTotal }} ครั้งในปีนี้<\u002Fp>\n          <sc-if value=\"{{ probEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#FFFFFF;border:1px solid #E7DCCE;border-radius:14px;padding:24px;font-size:13.5px;color:#8A7360\">ยังไม่มีข้อมูลการแลกเปลี่ยนในปีนี้<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ probHasData }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"background:#FFFFFF;border:1px solid #E7DCCE;border-radius:14px;padding:24px;display:flex;gap:32px;align-items:center;flex-wrap:wrap\">\n              <div style=\"{{ pieStyle }}\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:9px;flex:1;min-width:260px\">\n                <sc-for list=\"{{ probLegend }}\" as=\"pg\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;gap:10px\">\n                    <span style=\"{{ pg.swatchStyle }}\"><\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:600;flex:1\">{{ pg.label }}<\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:800;white-space:nowrap\">{{ pg.countTxt }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin-top:24px\">\n            <h2 style=\"font-size:17px;font-weight:800;margin:0 0 4px\">📆 ปัญหาตามช่วงเดือนที่เลือก<\u002Fh2>\n            <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 12px\">\n              <div style=\"position:relative\">\n                <input type=\"month\" value=\"{{ probFrom }}\" sc-camel-on-change=\"{{ setProbFrom }}\" style=\"padding:7px 10px;border:1px solid #E7DCCE;border-radius:9px;font-size:13px;background:#FFFFFF;color:transparent\">\n                <span style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;font-size:13px;color:#1C3540;font-weight:600\">{{ probFromTxt }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:13px;color:#8A7360\">ถึง<\u002Fspan>\n              <div style=\"position:relative\">\n                <input type=\"month\" value=\"{{ probTo }}\" sc-camel-on-change=\"{{ setProbTo }}\" style=\"padding:7px 10px;border:1px solid #E7DCCE;border-radius:9px;font-size:13px;background:#FFFFFF;color:transparent\">\n                <span style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;font-size:13px;color:#1C3540;font-weight:600\">{{ probToTxt }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:13px;font-weight:700;color:#8A7360\">รวม {{ probTotal2 }} ครั้ง<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ prob2Empty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#FFFFFF;border:1px solid #E7DCCE;border-radius:14px;padding:24px;font-size:13.5px;color:#8A7360\">ไม่มีข้อมูลการแลกเปลี่ยนในช่วงเดือนที่เลือก<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ prob2HasData }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#FFFFFF;border:1px solid #E7DCCE;border-radius:14px;padding:24px;display:flex;gap:32px;align-items:center;flex-wrap:wrap\">\n                <div style=\"{{ pieStyle2 }}\"><\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:9px;flex:1;min-width:260px\">\n                  <sc-for list=\"{{ probLegend2 }}\" as=\"pg2\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;align-items:center;gap:10px\">\n                      <span style=\"{{ pg2.swatchStyle }}\"><\u002Fspan>\n                      <span style=\"font-size:13px;font-weight:600;flex:1\">{{ pg2.label }}<\u002Fspan>\n                      <span style=\"font-size:13px;font-weight:800;white-space:nowrap\">{{ pg2.countTxt }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ FORM (BOX IN) ═══════════ -->\n    <sc-if value=\"{{ isForm }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"กรอกข้อมูล Box In\" style=\"max-width:780px;margin:0 auto\">\n        <h2 style=\"font-size:17px;font-weight:800;margin:0 0 4px\">บันทึกการแลกเปลี่ยนกล่อง (Box In)<\u002Fh2>\n        <p style=\"margin:0 0 16px;font-size:13px;color:#5C7681\">ward นำกล่องมาแลกเปลี่ยน — เลือกกล่องที่รับเข้า + กล่องที่จ่ายไปแทน ระบบจะย้ายตำแหน่งกล่องและอัพเดทวันหมดอายุให้อัตโนมัติ<\u002Fp>\n\n        <div style=\"background:#FFFFFF;border:1px solid #E3EBEC;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:16px\">\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              กล่องที่นำมาเปลี่ยน (Box In) *\n              <sc-raw-select value=\"{{ form.boxNo }}\" sc-camel-on-change=\"{{ setBoxNo }}\" style=\"padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:#1C3540;min-height:40px\">\n                <option value=\"\">— เลือกกล่อง —<\u002Foption>\n                <sc-for list=\"{{ boxOptions }}\" as=\"bo\" hint-placeholder-count=\"4\">\n                  <option value=\"{{ bo.v }}\">{{ bo.label }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              กล่องที่จ่ายไป (Box Out)\n              <sc-raw-select value=\"{{ form.boxOutNo }}\" sc-camel-on-change=\"{{ setBoxOutNo }}\" style=\"padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:#1C3540;min-height:40px\">\n                <option value=\"\">— กล่องเดิมกลับ ward (ไม่จ่ายกล่องใหม่) —<\u002Foption>\n                <sc-for list=\"{{ boxOutOptions }}\" as=\"boo\" hint-placeholder-count=\"4\">\n                  <option value=\"{{ boo.v }}\">{{ boo.label }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              Ward ที่นำมาแลกเปลี่ยน *\n              <sc-raw-select value=\"{{ form.ward }}\" sc-camel-on-change=\"{{ setWard }}\" style=\"padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:#1C3540;min-height:40px\">\n                <option value=\"\">— เลือก ward —<\u002Foption>\n                <sc-for list=\"{{ formWards }}\" as=\"w\" hint-placeholder-count=\"4\">\n                  <option value=\"{{ w }}\">{{ w }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              ชื่อเภสัชกร *\n              <sc-raw-select value=\"{{ form.pharmacist }}\" sc-camel-on-change=\"{{ setPharmacist }}\" style=\"padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:#1C3540;min-height:40px\">\n                <option value=\"\">— เลือกเภสัชกร —<\u002Foption>\n                <sc-for list=\"{{ pharmacists }}\" as=\"p\" hint-placeholder-count=\"4\">\n                  <option value=\"{{ p }}\">{{ p }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              วันที่นำมาเปลี่ยน *\n              <div style=\"position:relative\">\n                <input type=\"date\" value=\"{{ form.dateIn }}\" sc-camel-on-change=\"{{ setDateIn }}\" style=\"width:100%;padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:transparent;min-height:40px\">\n                <span style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;font-size:14px;color:#1C3540;font-weight:600\">{{ dateInTxt }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              วันหมดอายุใหม่ของกล่อง (อัตโนมัติ: +3 เดือน −1 วัน)\n              <div style=\"padding:9px 10px;border:1px dashed #D6E1E2;border-radius:9px;font-size:14px;background:#F8FBFA;color:#0F7F77;font-weight:700;min-height:40px;display:flex;align-items:center\">{{ autoExpiryTxt }}<\u002Fdiv>\n            <\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              ชนิดยาที่มีอายุสั้นที่สุดในกล่อง *\n              <sc-raw-select value=\"{{ form.shortDrug }}\" sc-camel-on-change=\"{{ setShortDrug }}\" style=\"padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:#1C3540;min-height:40px\">\n                <option value=\"\">— เลือกยา —<\u002Foption>\n                <sc-for list=\"{{ shortDrugOptions }}\" as=\"sdo\" hint-placeholder-count=\"4\">\n                  <option value=\"{{ sdo }}\">{{ sdo }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              วันหมดอายุของยาที่อายุสั้นที่สุด *\n              <div style=\"position:relative\">\n                <input type=\"date\" value=\"{{ form.shortExpiry }}\" sc-camel-on-change=\"{{ setShortExpiry }}\" style=\"width:100%;padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:transparent;min-height:40px\">\n                <span style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;font-size:14px;color:#1C3540;font-weight:600\">{{ shortExpiryTxt }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Flabel>\n          <\u002Fdiv>\n\n          <div style=\"border-top:1px solid #EDF2F2;padding-top:14px\">\n            <div style=\"font-size:13.5px;font-weight:800;margin-bottom:2px\">ยาที่ใช้ไป<\u002Fdiv>\n            <div style=\"font-size:12px;color:#5C7681;margin-bottom:10px\">ถ้าไม่มีการใช้ยา ปล่อยว่างได้ · อย่าลืมระบุยาอายุสั้นสุดของกล่องด้านบนทุกครั้ง<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ formRows }}\" as=\"r\" hint-placeholder-count=\"1\">\n                <div style=\"background:#F8FBFA;border:1px solid #E3EBEC;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px\">\n                  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px\">\n                    <label style=\"display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:700;color:#5C7681\">\n                      ยา\n                      <sc-raw-select value=\"{{ r.drug }}\" sc-camel-on-change=\"{{ r.setDrug }}\" style=\"padding:8px 9px;border:1px solid #D6E1E2;border-radius:8px;font-size:13.5px;background:#FFFFFF;color:#1C3540\">\n                        <option value=\"\">— เลือกยา —<\u002Foption>\n                        <sc-for list=\"{{ r.drugOptions }}\" as=\"d\" hint-placeholder-count=\"3\">\n                          <option value=\"{{ d }}\">{{ d }}<\u002Foption>\n                        <\u002Fsc-for>\n                      <\u002Fsc-raw-select>\n                    <\u002Flabel>\n                    <label style=\"display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:700;color:#5C7681\">\n                      จำนวนที่ใช้\n                      <input type=\"number\" min=\"1\" value=\"{{ r.qty }}\" sc-camel-on-change=\"{{ r.setQty }}\" style=\"padding:8px 9px;border:1px solid #D6E1E2;border-radius:8px;font-size:13.5px;background:#FFFFFF;color:#1C3540\">\n                    <\u002Flabel>\n                    <\u002Fdiv>\n                  <div style=\"display:flex;justify-content:flex-end\">\n                    <button sc-camel-on-click=\"{{ r.remove }}\" style=\"background:none;border:none;color:#D14343;font-size:12.5px;font-weight:600;cursor:pointer;padding:2px 4px\">ลบรายการนี้<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <button sc-camel-on-click=\"{{ addRow }}\" style=\"margin-top:10px;width:100%;padding:10px;border:1.5px dashed #17A398;border-radius:10px;background:#FFFFFF;color:#0F7F77;font-size:13.5px;font-weight:700;cursor:pointer\">+ เพิ่มรายการยา<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"border-top:1px solid #EDF2F2;padding-top:14px;display:flex;flex-direction:column;gap:12px\">\n            <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n              ปัญหาที่พบระหว่างการใช้ยา *\n              <sc-raw-select value=\"{{ form.problem }}\" sc-camel-on-change=\"{{ setProblem }}\" style=\"padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:#1C3540;min-height:40px\">\n                <option value=\"\">— เลือกปัญหา —<\u002Foption>\n                <sc-for list=\"{{ problems }}\" as=\"pr\" hint-placeholder-count=\"3\">\n                  <option value=\"{{ pr }}\">{{ pr }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <sc-if value=\"{{ isOtherProblem }}\" hint-placeholder-val=\"{{ false }}\">\n              <label style=\"display:flex;flex-direction:column;gap:5px;font-size:12.5px;font-weight:700;color:#5C7681;justify-content:flex-end\">\n                ระบุปัญหา (อื่นๆ) *\n                <input type=\"text\" value=\"{{ form.otherNote }}\" sc-camel-on-change=\"{{ setOtherNote }}\" placeholder=\"อธิบายปัญหาที่พบ\" style=\"padding:9px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:14px;background:#FFFFFF;color:#1C3540;min-height:40px\">\n              <\u002Flabel>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ formErrorOn }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#FBE3E3;color:#B03030;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600\">{{ formError }}<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <button sc-camel-on-click=\"{{ submitForm }}\" style=\"padding:13px;border:none;border-radius:11px;background:#F0705A;color:#FFFFFF;font-size:15px;font-weight:800;cursor:pointer\" style-hover=\"background:#E05B44\">บันทึกการแลกเปลี่ยน<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ HISTORY ═══════════ -->\n    <sc-if value=\"{{ isHistory }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"ประวัติการแลกเปลี่ยน\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px\">\n          <div>\n            <h2 style=\"font-size:17px;font-weight:800;margin:0 0 2px\">ประวัติการแลกเปลี่ยน + ปัญหาที่พบ<\u002Fh2>\n            <p style=\"margin:0;font-size:13px;color:#5C7681\">รวม {{ historyCount }} รายการ<\u002Fp>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ exportCsv }}\" style=\"padding:9px 16px;border:1px solid #17A398;border-radius:9px;background:#FFFFFF;color:#0F7F77;font-size:13.5px;font-weight:700;cursor:pointer\" style-hover=\"background:#EAF6F4\">Export Excel (CSV)<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #E3EBEC;border-radius:14px;overflow-x:auto\">\n          <div style=\"min-width:920px\">\n            <div style=\"display:grid;grid-template-columns:1fr 0.75fr 0.9fr 1fr 2fr 1.6fr 1fr;gap:10px;padding:10px 16px;font-size:12px;font-weight:700;color:#5C7681;border-bottom:1px solid #E3EBEC;background:#F8FBFA\">\n              <div>วันที่เปลี่ยน<\u002Fdiv><div>กล่อง เข้า→จ่าย<\u002Fdiv><div>Ward<\u002Fdiv><div>เภสัชกร<\u002Fdiv><div>ยาที่ใช้ไป<\u002Fdiv><div>ปัญหาที่พบ<\u002Fdiv><div>หมดอายุใหม่<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ historyRows }}\" as=\"h\" hint-placeholder-count=\"3\">\n              <div style=\"display:grid;grid-template-columns:1fr 0.75fr 0.9fr 1fr 2fr 1.6fr 1fr;gap:10px;padding:11px 16px;font-size:13px;border-bottom:1px solid #F0F4F4;align-items:start\">\n                <div>{{ h.dateTxt }}<\u002Fdiv>\n                <div style=\"font-weight:700\">{{ h.boxTxt }}<\u002Fdiv>\n                <div>{{ h.ward }}<\u002Fdiv>\n                <div>{{ h.pharmacist }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#3D5560\">{{ h.itemsTxt }}<\u002Fdiv>\n                <div style=\"{{ h.problemStyle }}\">{{ h.problemTxt }}<\u002Fdiv>\n                <div>{{ h.expTxt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ═══════════ REPORT ═══════════ -->\n    <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"รายงาน\">\n        <div data-noprint=\"1\" style=\"display:flex;align-items:end;gap:12px;flex-wrap:wrap;margin-bottom:16px;background:#FFFFFF;border:1px solid #E3EBEC;border-radius:14px;padding:14px 16px\">\n          <div>\n            <h2 style=\"font-size:17px;font-weight:800;margin:0 0 2px\">รายงานสรุปอัตโนมัติ<\u002Fh2>\n            <p style=\"margin:0;font-size:12.5px;color:#5C7681\">เลือกช่วงเดือน — ระบบสรุปเหตุการณ์จากประวัติการแลกเปลี่ยนให้อัตโนมัติ · กด \"พิมพ์ / บันทึก PDF\" เพื่อส่งรายงาน<\u002Fp>\n          <\u002Fdiv>\n          <label style=\"display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:700;color:#5C7681\">\n            ประเภทกล่อง\n            <sc-raw-select value=\"{{ reportBoxType }}\" sc-camel-on-change=\"{{ setReportBoxType }}\" style=\"padding:8px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:13.5px;background:#FFFFFF;color:#1C3540\">\n              <option value=\"all\">ทั้งคู่ (HAD + CPR)<\u002Foption>\n              <option value=\"HAD\">HAD (กล่อง 1–4)<\u002Foption>\n              <option value=\"CPR\">CPR (กล่อง 5–22)<\u002Foption>\n            <\u002Fsc-raw-select>\n          <\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:700;color:#5C7681\">\n            ตั้งแต่เดือน\n            <div style=\"position:relative\">\n              <input type=\"month\" value=\"{{ reportFrom }}\" sc-camel-on-change=\"{{ setReportFrom }}\" style=\"width:100%;padding:8px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:13.5px;background:#FFFFFF;color:transparent\">\n              <span style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;font-size:13.5px;color:#1C3540;font-weight:600\">{{ reportFromTxt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:700;color:#5C7681\">\n            ถึงเดือน\n            <div style=\"position:relative\">\n              <input type=\"month\" value=\"{{ reportTo }}\" sc-camel-on-change=\"{{ setReportTo }}\" style=\"width:100%;padding:8px 10px;border:1px solid #D6E1E2;border-radius:9px;font-size:13.5px;background:#FFFFFF;color:transparent\">\n              <span style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;font-size:13.5px;color:#1C3540;font-weight:600\">{{ reportToTxt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Flabel>\n          <button sc-camel-on-click=\"{{ printReport }}\" style=\"padding:10px 18px;border:none;border-radius:9px;background:#F0705A;color:#FFFFFF;font-size:13.5px;font-weight:800;cursor:pointer\" style-hover=\"background:#E05B44\">พิมพ์ / บันทึก PDF<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"background:#FFFFFF;border:1px solid #E3EBEC;border-radius:14px;padding:18px;overflow-x:auto\">\n          <div style=\"text-align:center;font-size:15px;font-weight:800;margin-bottom:14px\">สรุปรายงานการใช้{{ reportTitleBoxes }} เดือน {{ reportTitleRange }}<\u002Fdiv>\n          <sc-raw-table style=\"border-collapse:collapse;width:100%;min-width:760px\">\n            <sc-raw-thead>\n              <sc-raw-tr>\n                <sc-raw-th style=\"border:1px solid #1C3540;padding:6px 8px;font-size:12px;background:#F8FBFA;width:30px\">ที่<\u002Fsc-raw-th>\n                <sc-raw-th style=\"border:1px solid #1C3540;padding:6px 8px;font-size:12px;background:#F8FBFA;min-width:160px;text-align:left\">เหตุการณ์ (จำนวนครั้ง) ที่พบ<\u002Fsc-raw-th>\n                <sc-for list=\"{{ reportMonths }}\" as=\"rm\" hint-placeholder-count=\"3\">\n                  <sc-raw-th style=\"border:1px solid #1C3540;padding:6px 8px;font-size:12px;background:#F8FBFA;white-space:nowrap\">{{ rm }}<\u002Fsc-raw-th>\n                <\u002Fsc-for>\n                <sc-raw-th style=\"border:1px solid #1C3540;padding:6px 8px;font-size:12px;background:#FBBF24;white-space:nowrap\">รวม<\u002Fsc-raw-th>\n              <\u002Fsc-raw-tr>\n            <\u002Fsc-raw-thead>\n            <sc-raw-tbody>\n              <sc-for list=\"{{ reportRows }}\" as=\"rr\" hint-placeholder-count=\"4\">\n                <sc-raw-tr>\n                  <sc-raw-td style=\"border:1px solid #1C3540;padding:6px 8px;font-size:12px;text-align:center;vertical-align:top\">{{ rr.no }}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"border:1px solid #1C3540;padding:6px 8px;font-size:12px;font-weight:600;vertical-align:top\">{{ rr.problem }}<\u002Fsc-raw-td>\n                  <sc-for list=\"{{ rr.cells }}\" as=\"rc\" hint-placeholder-count=\"3\">\n                    <sc-raw-td style=\"border:1px solid #1C3540;padding:6px 8px;font-size:12px;vertical-align:top\">\n                      <div style=\"text-align:right;font-weight:700\">{{ rc.count }}<\u002Fdiv>\n                      <sc-for list=\"{{ rc.details }}\" as=\"rd\" hint-placeholder-count=\"0\">\n                        <div style=\"font-size:10.5px;color:#3D5560;margin-top:2px\">{{ rd }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fsc-raw-td>\n                  <\u002Fsc-for>\n                  <sc-raw-td style=\"border:1px solid #1C3540;padding:6px 8px;font-size:12.5px;text-align:right;font-weight: :12.5px;color:#3D5560;line-height:1.8\">\n                  <strong>วิธีตั้งค่า (ทำครั้งเดียว):<\u002Fstrong><br>\n                  1. สร้าง Google Sheet ใหม่ → เมนู <strong>ส่วนขยาย (Extensions) → Apps Script<\u002Fstrong><br>\n                  2. ลบโค้ดเดิม แล้ววางโค้ดจากไฟล์ <strong>Code.gs<\u002Fstrong> ที่ได้รับ → กดบันทึก<br>\n                  3. กด <strong>Deploy → New deployment → Web app<\u002Fstrong> · Execute as: <strong>Me<\u002Fstrong> · Who has access: <strong>Anyone<\u002Fstrong> → Deploy แล้วอนุญาตสิทธิ์<br>\n                  4. คัดลอก URL ที่ลงท้ายด้วย <strong>/exec<\u002Fstrong> มาวางในช่องด้านบน → กดเชื่อมต่อ\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Boxes admin -->\n            <div>\n              <h3 style=\"font-size:15px;font-weight:800;margin:0 0 4px\">จัดการกล่อง (Box Out / แก้ไข)<\u002Fh3>\n              <p style=\"margin:0 0 10px;font-size:12.5px;color:#5C7681\">เปลี่ยนที่อยู่กล่อง = box out ไปประจำ ward หรือรับกลับห้องยา · แก้วันหมดอายุกล่อง และยาอายุสั้นสุดได้โดยตรง<\u002Fp>\n              <div style=\"background:#FFFFFF;border:1px solid #E3EBEC;border-radius:14px;overflow-x:auto\">\n                <div style=\"min-width:900px\">\n                  <div style=\"display:grid;grid-template-columns:0.5fr 1.2fr 1fr 1.3fr 1fr 0.8fr;gap:10px;padding:10px 16px;font-size:12px;font-weight:700;color:#5C7681;border-bottom:1px solid #E3EBEC;background:#F8FBFA\">\n                    <div>กล่อง<\u002Fdiv><div>อยู่ที่<\u002Fdiv><div>วันหมดอายุกล่อง<\u002Fdiv><div>ยาอายุสั้นสุด<\u002Fdiv><div>วันหมดอายุยา<\u002Fdiv><div>สถานะ<\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-for list=\"{{ adminBoxes }}\" as=\"ab\" hint-placeholder-count=\"5\">\n                    <div style=\"display:grid;grid-template-columns:0.5fr 1.2fr 1fr 1.3fr 1fr 0.8fr;gap:10px;padding:9px 16px;font-size:13px;border-bottom:1px solid #F0F4F4;align-items:center\">\n                      <div style=\"font-weight:700\">{{ ab.no }}<\u002Fdiv>\n                      <div>\n                        <sc-raw-select value=\"{{ ab.ward }}\" sc-camel-on-change=\"{{ ab.setWard }}\" style=\"width:100%;padding:7px 8px;border:1px solid #D6E1E2;border-radius:8px;font-size:13px;background:#FFFFFF;color:#1C3540\">\n                          <option value=\"\">ห้องยา (ยังไม่พร้อมจ่าย)<\u002Foption>\n                          <sc-for list=\"{{ wards }}\" as=\"w2\" hint-placeholder-count=\"3\">\n                            <option value=\"{{ w2 }}\">{{ w2 }}<\u002Foption>\n                          <\u002Fsc-for>\n                        <\u002Fsc-raw-select>\n                      <\u002Fdiv>\n                      <div style=\"position:relative\"><input type=\"date\" value=\"{{ ab.expiry }}\" sc-camel-on-change=\"{{ ab.setExpiry }}\" style=\"width:100%;padding:6px 8px;border:1px solid #D6E1E2;border-radius:8px;font-size:13px;background:#FFFFFF;color:transparent\"><span style=\"position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;font-size:12.5px;color:#1C3540;font-weight:600\">{{ ab.expiryTxt }}<\u002Fspan><\u002Fdiv>\n                      <div>\n                        <sc-raw-select value=\"{{ ab.shortDrug }}\" sc-camel-on-change=\"{{ ab.setShortDrug }}\" style=\"width:100%;padding:7px 8px;border:1px solid #D6E1E2;border-radius:8px;font-size:12px;background:#FFFFFF;color:#1C3540\">\n                          <option value=\"\">—<\u002Foption>\n                          <sc-for list=\"{{ ab.drugChoices }}\" as=\"abd\" hint-placeholder-count=\"3\">\n                            <option value=\"{{ abd }}\">{{ abd }}<\u002Foption>\n                          <\u002Fsc-for>\n                        <\u002Fsc-raw-select>\n                      <\u002Fdiv>\n                      <div style=\"position:relative\"><input type=\"date\" value=\"{{ ab.shortExpiry }}\" sc-camel-on-change=\"{{ ab.setShortExpiry }}\" style=\"width:100%;padding:6px 8px;border:1px solid #D6E1E2;border-radius:8px;font-size:13px;background:#FFFFFF;color:transparent\"><span style=\"position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;font-size:12.5px;color:#1C3540;font-weight:600\">{{ ab.shortExpiryTxt }}<\u002Fspan><\u002Fdiv>\n                      <div><span style=\"{{ ab.badgeStyle }}\">{{ ab.badgeLabel }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Records admin -->\n            <div>\n              <h3 style=\"font-size:15px;font-weight:800;margin:0 0 10px\">แก้ไขประวัติ (ลบรายการที่กรอกผิด)<\u002Fh3>\n              <div style=\"background:#FFFFFF;border:1px solid #E3EBEC;border-radius:14px\">\n                <sc-for list=\"{{ adminExchanges }}\" as=\"ax\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;border-bottom:1px solid #F0F4F4;font-size:13px\">\n                    <div>{{ ax.summary }}<\u002Fdiv>\n                    <button sc-camel-on-click=\"{{ ax.remove }}\" style=\"background:none;border:none;color:#D14343;font-size:12.5px;font-weight:600;cursor:pointer;flex-shrink:0\">ลบ<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <sc-if value=\"{{ boxDetailOn }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeBoxDetail }}\" style=\"position:fixed;inset:0;background:rgba(28,53,64,0.45);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px\">\n      <div sc-camel-on-click=\"{{ stopProp }}\" style=\"background:#FFFFFF;border-radius:16px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px\">\n          <div>\n            <div style=\"font-size:16px;font-weight:800\">📦 {{ boxDetailTitle }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#5C7681;margin-top:2px\">{{ boxDetailWard }} · หมดอายุกล่อง {{ boxDetailExp }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ closeBoxDetail }}\" style=\"background:#F2F6F5;border:none;border-radius:8px;width:30px;height:30px;font-size:14px;font-weight:800;color:#5C7681;cursor:pointer;flex:none\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column\">\n          <div style=\"display:grid;grid-template-columns:1.5fr 1.6fr;gap:10px;padding:8px 10px;font-size:11.5px;font-weight:700;color:#5C7681;border-bottom:1px solid #E3EBEC;background:#F8FBFA;border-radius:8px 8px 0 0\">\n            <div>ยา<\u002Fdiv><div>วันหมดอายุ<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ boxDetailRows }}\" as=\"bd\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid;grid-template-columns:1.5fr 1.6fr;gap:10px;padding:8px 10px;font-size:12.5px;border-bottom:1px solid #F0F4F4;align-items:center\">\n              <div style=\"font-weight:600\">{{ bd.drug }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n                <sc-if value=\"{{ bd.isShort }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-size:12px;color:#5C7681\">หมด {{ bd.expTxt }}<\u002Fspan>\n                  <span style=\"{{ bd.badgeStyle }}\">{{ bd.badgeLabel }}<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:700;background:#FCF3D7;color:#96690B;padding:2px 8px;border-radius:6px\">อายุสั้นสุดในกล่อง<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ bd.notShort }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"font-size:12px;color:#8CA1A9\">—<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ syncErrOn }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;top:0;left:0;right:0;z-index:95;background:#B03030;color:#FFFFFF;display:flex;align-items:center;justify-content:center;gap:12px;padding:9px 16px;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.2)\">\n      <span>⚠️ ซิงค์ขึ้น Google Sheets ไม่สำเร็จ — ข้อมูลยังอยู่ในเครื่องนี้ จะลองใหม่อัตโนมัติทุก 30 วินาที อย่าเพิ่งปิดหน้านี้<\u002Fspan>\n      <button sc-camel-on-click=\"{{ retryNow }}\" style=\"background:#FFFFFF;color:#B03030;border:none;border-radius:8px;padding:5px 14px;font-size:12.5px;font-weight:800;cursor:pointer;flex:none\">ลองใหม่เดี๋ยวนี้<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ toastOn }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#178F5F;color:#FFFFFF;padding:11px 22px;border-radius:99px;font-size:14px;font-weight:700;box-shadow:0 8px 24px rgba(23,143,95,0.35);z-index:100\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;adminPin&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;103210&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;ความปลอดภัย&quot;},&quot;defaultSyncUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://script.google.com/macros/s/AKfycbwkMH1tK1YQmgZ9A3sC1TN-57FKgUtwzTfbdo7C43CQ9kOoV3-Mi_EIndw5LfCWEhjpfw/exec&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Google Sheets&quot;},&quot;warnDaysSoon&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:30,&quot;min&quot;:7,&quot;max&quot;:120,&quot;unit&quot;:&quot;วัน&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;เกณฑ์เตือนหมดอายุ&quot;},&quot;warnDaysUrgent&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:7,&quot;min&quot;:1,&quot;max&quot;:30,&quot;unit&quot;:&quot;วัน&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;เกณฑ์เตือนหมดอายุ&quot;}}\">\nconst KEY = 'bym_boxmaster_v2';\nconst SYNC_KEY = 'bym_boxmaster_sync_url';\n\nconst DRUGS13 = [\n  'Adenosine 6 mg/2ml', 'Adrenaline 1mg/ml', 'Amiodarone 150 mg/3ml', 'Atropine 0.6mg/ml',\n  '10% Calcium gluconate 1g/10ml', 'Dopamine 250mg/10ml', '10% Magnesium sulfate 1g/10ml',\n  '50% Magnesium sulfate 1g/2ml', 'Nitroglycerin 50mg/10ml', 'Norepinephrine 4mg/4ml',\n  'Potassium chloride KCl 20mEq/10ml', '7.5% Sodium bicarbonate 44.6mEq/50ml', 'Nicardipine 10mg/10ml'\n];\nconst DRUGS6 = [\n  'Adrenaline 1mg/ml', 'Amiodarone 150 mg/3ml', '10% Calcium gluconate 1g/10ml',\n  '50% Glucose', '50% Magnesium sulfate 1g/2ml', '7.5% Sodium bicarbonate 44.6mEq/50ml'\n];\nconst ALL_DRUGS = DRUGS13.concat(['50% Glucose']);\nconst PHARMACISTS = ['ภญ.ศิริณิช','ภญ.พัชรินทร์','ภก.ธวัช','ภญ.อภิญญา','ภก.ชยุตม์','ภญ.จริยา','ภญ.วิชชุลดา','ภญ.พรพิมล','ภญ.ศลิษา','ภญ.วารินาถ','ภญ.ณัฐธยาน์','ภญ.ฐิติพร'];\nconst WARDS = ['ER','EMS','Ward ชาย','Ward หญิง','Ward 3','Ward พิเศษ 5','Ward VIP 6','Ward ICU','ห้องคลอด','ห้องหัตถการ','OR','ทันตกรรม','ห้องยา OPD','ห้องยา IPD'];\nconst PHARM_LOCS = ['ห้องยา OPD', 'ห้องยา IPD'];\nfunction isPharm(w) { return !w || PHARM_LOCS.includes(w); }\nfunction isReady(w) { return PHARM_LOCS.includes(w); } // ห้องยา OPD/IPD = พร้อมจ่าย, ห้องยาเฉยๆ = ยังไม่พร้อมจ่าย\nfunction pharmLabel(w) { return 'อยู่' + (w || 'ห้องยา') + (isReady(w) ? ' (พร้อมจ่าย)' : ' (ยังไม่พร้อมจ่าย)'); }\nconst PROBLEMS = ['ไม่พบ Med error','ใช้ยาไป แต่ไม่ได้ key ใน HOSxP','key ใช้ยาไม่ตรงกับที่ใช้ไปจริง','ใช้ยาไปคนละชนิดกับที่เขียนในใบบันทึกการใช้ยา','พบยาหายไปจากกล่องโดยไม่มีผู้ป่วยใช้','พบยาอายุสั้นกว่ารายการยาหน้ากล่อง','อื่นๆ'];\n\nfunction asArr(v) { return Array.isArray(v) ? v : v ? [v] : []; }\nfunction iso(d) { return d.toISOString().slice(0, 10); }\nfunction addDays(n) { const d = new Date(); d.setDate(d.getDate() + n); return iso(d); }\nfunction daysLeft(isoStr) {\n  if (!isoStr) return 9999;\n  const t = new Date(); t.setHours(0,0,0,0);\n  const e = new Date(isoStr + 'T00:00:00');\n  return Math.round((e - t) / 86400000);\n}\nconst TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];\nfunction fmtThaiMonth(ym) {\n  if (!ym) return '—';\n  const [y, m] = ym.split('-').map(Number);\n  return TH_MONTHS[m - 1] + ' ' + ((y + 543) % 100);\n}\nfunction fmtThai(isoStr) {\n  if (!isoStr) return '—';\n  try { return new Date(isoStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' }); }\n  catch (e) { return isoStr; }\n}\nfunction autoExpiryOf(dateIn) {\n  if (!dateIn) return '';\n  const d = new Date(dateIn + 'T12:00:00');\n  d.setMonth(d.getMonth() + 3);\n  d.setDate(d.getDate() - 1);\n  const p = n => String(n).padStart(2, '0');\n  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());\n}\nfunction boxType(n) { return n <= 4 ? 'HAD' : 'CPR'; }\nfunction migrateData(d) {\n  if (!d || !d.boxes) return d;\n  let changed = false;\n  const fixW = w => w === 'วิสัญญี' ? 'OR' : w;\n  const boxes1 = d.boxes.map(b => { const nw = fixW(b.ward); if (nw !== b.ward) changed = true; return nw !== b.ward ? { ...b, ward: nw } : b; });\n  const exch1 = (d.exchanges || []).map(x => { const nw = fixW(x.ward); if (nw !== x.ward) changed = true; return nw !== x.ward ? { ...x, ward: nw } : x; });\n  d = { ...d, boxes: boxes1, exchanges: exch1 };\n  // migrate: lotIds values string → array (กล่องหนึ่งมีได้หลาย lot ต่อยา)\n  const boxesA = d.boxes.map(b => {\n    let ch = false;\n    const lotIds = {};\n    Object.entries(b.lotIds || {}).forEach(([k, v]) => {\n      if (Array.isArray(v)) { lotIds[k] = v; }\n      else if (v) { lotIds[k] = [v]; ch = true; }\n    });\n    if (ch) { changed = true; return { ...b, lotIds }; }\n    return b;\n  });\n  d = { ...d, boxes: boxesA };\n  const maxNo = d.boxes.reduce((m, b) => Math.max(m, b.no), 0);\n  if (maxNo <= 20 && !d.renumbered22) {\n    changed = true;\n    const shift = n => (n && n >= 4) ? n + 1 : n;\n    d = {\n      ...d, renumbered22: true,\n      boxes: d.boxes.map(b => b.no >= 4 ? { ...b, no: b.no + 1 } : b)\n        .concat([{ no: 4, ward: null, expiry: '', lotIds: {} }, { no: 22, ward: null, expiry: '', lotIds: {} }])\n        .sort((a, b) => a.no - b.no),\n      exchanges: (d.exchanges || []).map(x => ({ ...x, boxNo: shift(x.boxNo), boxOutNo: x.boxOutNo ? shift(x.boxOutNo) : x.boxOutNo }))\n    };\n  }\n  // ตัดระบบ lot tracking: แปลงข้อมูล lot เดิมเป็น \"ยาอายุสั้นสุดของกล่อง\" ครั้งเดียว\n  const lotOf = id => (d.lots || []).find(l => l.id === id);\n  const boxesS = d.boxes.map(b => {\n    if (b.shortExpiry || !b.lotIds) return b;\n    let best = null;\n    Object.entries(b.lotIds || {}).forEach(([drug, v]) => {\n      asArr(v).forEach(id => { const l = lotOf(id); if (l && l.expiry && (!best || l.expiry < best.expiry)) best = { drug, expiry: l.expiry }; });\n    });\n    if (!best) return b;\n    changed = true;\n    return { ...b, shortDrug: best.drug, shortExpiry: best.expiry };\n  });\n  d = { ...d, boxes: boxesS };\n  if (changed) d = { ...d, updatedAt: Date.now() };\n  return d;\n}\nfunction boxName(n) { return 'กล่อง ' + n + ' ' + boxType(n); }\nfunction withDel(data, kind, id) { // tombstone กันรายการที่ลบแล้วโผล่กลับตอน merge\n  const del = { lots: [], exchanges: [], ...(data.del || {}) };\n  del[kind] = del[kind].concat([id]);\n  return del;\n}\nfunction mergeData(local, server) { // รวมข้อมูลสองเครื่องแบบไม่ทำรายการหาย\n  if (!server || !server.boxes || server.seeded) return local;\n  if (!local || !local.boxes || local.seeded) return server;\n  const dedup = arr => [...new Set(arr)];\n  const del = {\n    lots: dedup([...(local.del?.lots || []), ...(server.del?.lots || [])]),\n    exchanges: dedup([...(local.del?.exchanges || []), ...(server.del?.exchanges || [])])\n  };\n  const newer = (local.updatedAt || 0) >= (server.updatedAt || 0) ? local : server;\n  const older = newer === local ? server : local;\n  const unionById = (a, b) => { const m = new Map(); b.forEach(x => m.set(x.id, x)); a.forEach(x => m.set(x.id, x)); return [...m.values()]; };\n  return {\n    ...newer,\n    lots: unionById(newer.lots, older.lots).filter(l => !del.lots.includes(l.id)),\n    exchanges: unionById(newer.exchanges, older.exchanges).filter(x => !del.exchanges.includes(x.id)),\n    del,\n    updatedAt: Math.max(local.updatedAt || 0, server.updatedAt || 0)\n  };\n}\nconst BADGE_BASE = 'display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:700;white-space:nowrap;';\nconst STATUS = {\n  expired: { label: 'ยาหมดอายุแล้ว', style: BADGE_BASE + 'background:#FBE3E3;color:#B03030' },\n  boxExpired: { label: 'กล่องหมดอายุแล้ว', style: BADGE_BASE + 'background:#FBE3E3;color:#B03030' },\n  d7:      { label: '<7 วัน',        style: BADGE_BASE + 'background:#FCE9D8;color:#C25812' },\n  d30:     { label: '<30 วัน',       style: BADGE_BASE + 'background:#FCF3D7;color:#96690B' },\n  ok:      { label: 'ปกติ',          style: BADGE_BASE + 'background:#E3F5EC;color:#137A52' }\n};\n\nfunction seedData() {\n  const mkLot = (drug, lotNo, exp) => ({ id: 'L_' + drug.slice(0, 4) + '_' + lotNo, drug, lotNo, expiry: exp });\n  const lots = [\n    mkLot(DRUGS13[0], 'AD6-114', addDays(120)),\n    mkLot(DRUGS13[1], 'ADR-2601', addDays(210)),\n    mkLot(DRUGS13[1], 'ADR-2512', addDays(25)),\n    mkLot(DRUGS13[2], 'AMI-091', addDays(300)),\n    mkLot(DRUGS13[3], 'ATR-012', addDays(5)),\n    mkLot(DRUGS13[4], 'CAG-770', addDays(400)),\n    mkLot(DRUGS13[5], 'DOP-045', addDays(190)),\n    mkLot(DRUGS13[5], 'DOP-031', addDays(-3)),\n    mkLot(DRUGS13[6], 'MGS-110', addDays(160)),\n    mkLot(DRUGS13[7], 'MGS-502', addDays(90)),\n    mkLot(DRUGS13[8], 'NTG-055', addDays(45)),\n    mkLot(DRUGS13[9], 'NOR-204', addDays(200)),\n    mkLot(DRUGS13[10], 'KCL-365', addDays(365)),\n    mkLot(DRUGS13[11], 'SBC-447', addDays(310)),\n    mkLot(DRUGS13[11], 'SBC-446', addDays(28)),\n    mkLot(DRUGS13[12], 'NIC-140', addDays(140)),\n    mkLot('50% Glucose', 'GLU-501', addDays(240))\n  ];\n  const lotFor = {};\n  lots.forEach(l => { if (!lotFor[l.drug]) lotFor[l.drug] = l.id; });\n  lotFor[DRUGS13[1]] = lots[1].id;\n  const boxes = [];\n  for (let n = 1; n <= 22; n++) {\n    const drugs = n <= 4 ? DRUGS13 : DRUGS6;\n    const lotIds = {};\n    drugs.forEach(d => { lotIds[d] = [lotFor[d]]; });\n    if (n === 2) lotIds[DRUGS13[1]] = [lots[1].id, lots[2].id];\n    if (n === 3 || n === 5) lotIds[DRUGS13[11]] = ['L_' + DRUGS13[11].slice(0, 4) + '_SBC-446'];\n    if (n === 1) lotIds[DRUGS13[5]] = ['L_' + DRUGS13[5].slice(0, 4) + '_DOP-031'];\n    let exp = addDays(90 + ((n * 13) % 160));\n    if (n === 2) exp = addDays(20);\n    if (n === 7) exp = addDays(4);\n    if (n === 12) exp = addDays(-2);\n    boxes.push({ no: n, ward: n <= 12 ? WARDS[n - 1] : null, expiry: exp, lotIds });\n  }\n  const exchanges = [\n    { id: 'X1', date: addDays(-2), boxNo: 5, ward: 'Ward 3', pharmacist: 'ภญ.พัชรินทร์', items: [{ drug: 'Adrenaline 1mg/ml', lotNo: 'ADR-2601', qty: 2 }], problem: 'ไม่พบ Med error', note: '', newExpiry: addDays(150) },\n    { id: 'X2', date: addDays(-9), boxNo: 1, ward: 'ER', pharmacist: 'ภก.ธวัช', items: [{ drug: 'Amiodarone 150 mg/3ml', lotNo: 'AMI-091', qty: 3 }, { drug: 'Adenosine 6 mg/2ml', lotNo: 'AD6-114', qty: 1 }], problem: 'ใช้ยาไป แต่ไม่ได้ key ใน HOSxP', note: '', newExpiry: addDays(140) },\n    { id: 'X3', date: addDays(-20), boxNo: 9, ward: 'ห้องคลอด', pharmacist: 'ภญ.อภิญญา', items: [], problem: 'พบยาอายุสั้นกว่ารายการยาหน้ากล่อง', note: '', newExpiry: addDays(120) }\n  ];\n  const lotOf2 = id => lots.find(l => l.id === id);\n  boxes.forEach(b => {\n    let best = null;\n    Object.entries(b.lotIds).forEach(([drug, ids]) => ids.forEach(id => { const l = lotOf2(id); if (l && (!best || l.expiry < best.expiry)) best = { drug, expiry: l.expiry }; }));\n    if (best) { b.shortDrug = best.drug; b.shortExpiry = best.expiry; }\n  });\n  return { lots, boxes, exchanges, seeded: true, updatedAt: 0 };\n}\n\nfunction blankRow() { return { drug: '', qty: 1 }; }\nfunction blankForm() {\n  return { boxNo: '', boxOutNo: '', pharmacist: '', ward: '', dateIn: iso(new Date()), shortDrug: '', shortExpiry: '', problem: '', otherNote: '', rows: [blankRow()] };\n}\n\nclass Component extends DCLogic {\n  state = {\n    view: 'form', adminOk: false, pinInput: '', pinError: false,\n    boxEditSel: '', dashTab: 'box', boxDetailNo: null,\n    probFrom: (function () { const d = new Date(); d.setMonth(d.getMonth() - 5); return d.toISOString().slice(0, 7); })(),\n    probTo: new Date().toISOString().slice(0, 7),\n    reportFrom: (function () { const d = new Date(); d.setMonth(d.getMonth() - 5); return d.toISOString().slice(0, 7); })(),\n    reportTo: new Date().toISOString().slice(0, 7),\n    reportBoxType: 'all',\n    toast: '', formError: '',\n    adminLotDrug: '', adminLotNo: '', adminLotExp: '',\n    syncUrl: (function () { try { return localStorage.getItem(SYNC_KEY) || ''; } catch (e) { return ''; } })(),\n    syncUrlInput: (function () { try { return localStorage.getItem(SYNC_KEY) || ''; } catch (e) { return ''; } })(),\n    syncStatus: 'idle', lastSyncTxt: '',\n    form: blankForm(),\n    data: this.loadData()\n  };\n\n  loadData() {\n    try {\n      const raw = localStorage.getItem(KEY);\n      if (raw) { const d = JSON.parse(raw); if (d && d.boxes && d.lots) return migrateData(d); }\n    } catch (e) {}\n    return seedData();\n  }\n  commit(data, keepSeed) {\n    // ผู้ใช้แก้ข้อมูลจริงแล้ว → ไม่ใช่ข้อมูลตัวอย่างอีกต่อไป (ยกเว้นรีเซ็ต)\n    const stamped = { ...data, seeded: keepSeed ? !!data.seeded : false, updatedAt: Date.now() };\n    this.setState({ data: stamped });\n    try { localStorage.setItem(KEY, JSON.stringify(stamped)); } catch (e) {}\n    this.schedulePush(stamped);\n  }\n\n  componentDidMount() {\n    if (!this.state.syncUrl) {\n      const d = String(this.props.defaultSyncUrl ?? '').trim();\n      if (d.indexOf('https://') === 0 && d.indexOf('/exec') >= 0) {\n        try { localStorage.setItem(SYNC_KEY, d); } catch (e) {}\n        this.setState({ syncUrl: d, syncUrlInput: d }, () => this.pullSync());\n        return;\n      }\n    }\n    if (this.state.syncUrl) this.pullSync();\n  }\n  markSynced() {\n    this.setState({ syncStatus: 'ok', lastSyncTxt: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.' });\n  }\n  schedulePush(data) {\n    if (!this.state.syncUrl) return;\n    clearTimeout(this._pushT);\n    this._pushT = setTimeout(() => this.pushSync(data), 800);\n  }\n  async pushSync(data) {\n    const url = this.state.syncUrl;\n    if (!url) return;\n    if (data && data.seeded) { // ห้ามข้อมูลตัวอย่างขึ้นไปทับข้อมูลจริงใน Sheet\n      this.setState({ syncStatus: 'ok', lastSyncTxt: 'ข้อมูลตัวอย่าง — ไม่ซิงค์ขึ้น' });\n      return;\n    }\n    this.setState({ syncStatus: 'syncing' });\n    try {\n      // ดึงข้อมูลล่าสุดจาก Sheet มารวมก่อนบันทึก — กันทับรายการที่เครื่องอื่นเพิ่งเพิ่ม\n      let out = data;\n      try {\n        const r0 = await fetch(url + (url.indexOf('?') >= 0 ? '&' : '?') + 'action=load');\n        const j0 = await r0.json();\n        if (j0.ok && j0.data) {\n          out = mergeData(data, migrateData(j0.data));\n          if (out !== data) {\n            this.setState({ data: out });\n            try { localStorage.setItem(KEY, JSON.stringify(out)); } catch (e) {}\n          }\n        }\n      } catch (e) {}\n      const res = await fetch(url, {\n        method: 'POST',\n        headers: { 'Content-Type': 'text/plain;charset=utf-8' },\n        body: JSON.stringify({ action: 'save', data: out })\n      });\n      const j = await res.json();\n      if (!j.ok) throw new Error(j.error || 'save failed');\n      clearTimeout(this._retryT);\n      this.markSynced();\n    } catch (e) {\n      this.setState({ syncStatus: 'error' });\n      // ลองซิงค์ใหม่อัตโนมัติทุก 30 วินาที จนกว่าจะสำเร็จ\n      clearTimeout(this._retryT);\n      this._retryT = setTimeout(() => this.pushSync(this.state.data), 30000);\n    }\n  }\n  async pullSync() {\n    const url = this.state.syncUrl;\n    if (!url) return;\n    this.setState({ syncStatus: 'syncing' });\n    try {\n      const res = await fetch(url + (url.indexOf('?') >= 0 ? '&' : '?') + 'action=load');\n      const j = await res.json();\n      if (!j.ok) throw new Error(j.error || 'load failed');\n      const server = migrateData(j.data);\n      const local = this.state.data;\n      // merge ข้อมูลเครื่องนี้กับ Sheet — รายการไม่หายแม้กรอกพร้อมกันหลายเครื่อง\n      const merged = mergeData(local, server);\n      this.setState({ data: merged });\n      try { localStorage.setItem(KEY, JSON.stringify(merged)); } catch (e) {}\n      if (!server || !server.boxes || JSON.stringify(merged) !== JSON.stringify(server)) await this.pushSync(merged);\n      else this.markSynced();\n    } catch (e) {\n      this.setState({ syncStatus: 'error' });\n    }\n  }\n  showToast(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._toastT);\n    this._toastT = setTimeout(() => this.setState({ toast: '' }), 3200);\n  }\n  statusOf(days) {\n    const soon = Number(this.props.warnDaysSoon ?? 30);\n    const urgent = Number(this.props.warnDaysUrgent ?? 7);\n    if (days < 0) return STATUS.expired;\n    if (days < urgent) return STATUS.d7;\n    if (days < soon) return STATUS.d30;\n    return STATUS.ok;\n  }\n  lotById(id) { return this.state.data.lots.find(l => l.id === id); }\n  // สถานะกล่อง: ถ้ามียาในกล่องหมดอายุ → ยาหมดอายุแล้ว, ถ้าตัวกล่องเองหมดอายุ → กล่องหมดอายุแล้ว\n  boxStatus(box) {\n    const st = this.statusOf(this.boxWorstDays(box));\n    if (st !== STATUS.expired) return st;\n    return (box.shortExpiry && daysLeft(box.shortExpiry) < 0) ? STATUS.expired : STATUS.boxExpired;\n  }\n  boxWorstDays(box) {\n    let worst = daysLeft(box.expiry);\n    if (box.shortExpiry) worst = Math.min(worst, daysLeft(box.shortExpiry));\n    return worst;\n  }\n  updForm(patch) { this.setState({ form: { ...this.state.form, ...patch }, formError: '' }); }\n  updRow(i, patch) {\n    const rows = this.state.form.rows.map((r, j) => j === i ? { ...r, ...patch } : r);\n    this.updForm({ rows });\n  }\n\n  exportCsv() {\n    const esc = v => '\"' + String(v == null ? '' : v).replace(/\"/g, '\"\"') + '\"';\n    const head = ['วันที่นำมาเปลี่ยน','กล่องที่นำมาเปลี่ยน','กล่องที่จ่ายไป','Ward','เภสัชกร','ยาที่ใช้ไป','จำนวนรวม','ปัญหาที่พบ','หมายเหตุ','วันหมดอายุกล่องใหม่'];\n    const lines = [head.map(esc).join(',')];\n    this.state.data.exchanges.slice().sort((a, b) => b.date.localeCompare(a.date)).forEach(x => {\n      const items = (x.items || []).map(it => it.drug + (it.lotNo && it.lotNo !== '-' ? ' (Lot ' + it.lotNo + ')' : '') + ' x' + it.qty).join(' ; ');\n      const total = (x.items || []).reduce((s, it) => s + Number(it.qty || 0), 0);\n      lines.push([x.date, x.boxNo, x.boxOutNo || '', x.ward, x.pharmacist, items, total, x.problem, x.note || '', x.newExpiry].map(esc).join(','));\n    });\n    const blob = new Blob(['\\uFEFF' + lines.join('\\r\\n')], { type: 'text/csv;charset=utf-8' });\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(blob);\n    a.download = 'BoxMaster-history.csv';\n    a.click();\n    setTimeout(() => URL.revokeObjectURL(a.href), 5000);\n    this.showToast('ดาวน์โหลดไฟล์ CSV แล้ว (เปิดด้วย Excel ได้เลย)');\n  }\n\n  submitForm() {\n    const f = this.state.form;\n    const data = this.state.data;\n    if (!f.boxNo || !f.pharmacist || !f.ward || !f.dateIn || !f.problem) {\n      this.setState({ tTo: e.target.value }),\n      reportMonths: monthKeys.map(monLabel),\n      reportTitleRange: monthKeys.length ? monLabel(monthKeys[0]) + (monthKeys.length > 1 ? ' – ' + monLabel(monthKeys[monthKeys.length - 1]) : '') : '—',\n      reportRows, reportTotalsRow, reportGrandTotal,\n      reportBoxType: s.reportBoxType,\n      setReportBoxType: e => this.setState({ reportBoxType: e.target.value }),\n      reportTitleBoxes, reportDrugRows, reportDrugColSpan, noDrugRows,\n      printReport: () => window.print(),\n      resetData: () => {\n        if (!confirm('รีเซ็ตข้อมูลทั้งหมดกลับเป็นข้อมูลตัวอย่าง? (ข้อมูลตัวอย่างจะไม่ถูกซิงค์ขึ้น Google Sheets)')) return;\n        this.commit(seedData(), true);\n        this.showToast('รีเซ็ตข้อมูลตัวอย่างแล้ว');\n      },\n      // Google Sheets sync\n      syncChipOn: !!s.syncUrl,\n      syncChipTxt: s.syncStatus === 'syncing' ? 'กำลังซิงค์…' : s.syncStatus === 'error' ? 'ซิงค์ไม่สำเร็จ' : s.lastSyncTxt ? 'ซิงค์ล่าสุด ' + s.lastSyncTxt : 'เชื่อมต่อ Sheets แล้ว',\n      syncChipStyle: 'display:inline-flex;align-items:center;padding:5px 12px;border-radius:99px;font-size:11.5px;font-weight:700;white-space:nowrap;' + (s.syncStatus === 'error' ? 'background:#FBE3E3;color:#B03030' : s.syncStatus === 'syncing' ? 'background:#FCF3D7;color:#96690B' : 'background:#E3F5EC;color:#137A52'),\n      syncConnected: !!s.syncUrl,\n      syncUrlInput: s.syncUrlInput,\n      setSyncUrlInput: e => this.setState({ syncUrlInput: e.target.value }),\n      syncStatusTxt: !s.syncUrl\n        ? 'สถานะ: ยังไม่เชื่อมต่อ — ข้อมูลเก็บอยู่ในเครื่องนี้เท่านั้น'\n        : s.syncStatus === 'syncing' ? 'สถานะ: กำลังซิงค์ข้อมูล…'\n        : s.syncStatus === 'error' ? 'สถานะ: ซิงค์ไม่สำเร็จ — ตรวจสอบ URL หรือการ Deploy (Access ต้องเป็น Anyone) แล้วกด \"ซิงค์ตอนนี้\" อีกครั้ง'\n        : 'สถานะ: เชื่อมต่อแล้ว' + (s.lastSyncTxt ? ' · ซิงค์ล่าสุด ' + s.lastSyncTxt : ''),\n      syncStatusStyle: 'font-size:13px;font-weight:700;' + (!s.syncUrl ? 'color:#5C7681' : s.syncStatus === 'error' ? 'color:#B03030' : 'color:#137A52'),\n      saveSyncUrl: () => {\n        const url = s.syncUrlInput.trim();\n        if (!url || url.indexOf('https://') !== 0 || url.indexOf('/exec') < 0) {\n          this.showToast('URL ไม่ถูกต้อง — ต้องเป็น Web App URL ที่ลงท้ายด้วย /exec');\n          return;\n        }\n        try { localStorage.setItem(SYNC_KEY, url); } catch (e) {}\n        this.setState({ syncUrl: url }, () => this.pullSync());\n        this.showToast('เชื่อมต่อแล้ว กำลังซิงค์ข้อมูล…');\n      },\n      syncNow: () => this.pullSync(),\n      disconnectSync: () => {\n        if (!confirm('ยกเลิกการเชื่อมต่อ Google Sheets? (ข้อมูลใน Sheet ไม่ถูกลบ)')) return;\n        try { localStorage.removeItem(SYNC_KEY); } catch (e) {}\n        this.setState({ syncUrl: '', syncUrlInput: '', syncStatus: 'idle', lastSyncTxt: '' });\n      },\n      // box detail modal\n      boxDetailOn: !!dBox,\n      boxDetailTitle: dBox ? boxName(dBox.no) : '',\n      boxDetailWard: dBox ? (isPharm(dBox.ward) ? pharmLabel(dBox.ward) : 'อยู่ที่ ' + dBox.ward) : '',\n      boxDetailExp: dBox ? fmtThai(dBox.expiry) : '',\n      boxDetailRows,\n      closeBoxDetail: () => this.setState({ boxDetailNo: null }),\n      stopProp: e => e.stopPropagation(),\n      syncErrOn: s.syncStatus === 'error' && !!s.syncUrl,\n      retryNow: () => this.pushSync(this.state.data),\n      toast: s.toast, toastOn: !!s.toast\n    };\n  }\n\n  tryUnlock(pin) {\n    if (this.state.pinInput === pin) this.setState({ adminOk: true, pinError: false, pinInput: '' });\n    else this.setState({ pinError: true });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
